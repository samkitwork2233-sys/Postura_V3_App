<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POSTURA_V3 Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
margin:15px auto;
width:360px;
border-radius:12px;
}

.good{color:#22c55e;}
.bad{color:#ef4444;}

.slider{width:80%;}

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

canvas{
background:white;
border-radius:10px;
}

</style>

</head>

<body>

<h1>POSTURA_V3 Dashboard</h1>

<div class="card">
<h3>Device</h3>
<button onclick="connectDevice()">Connect Device</button>
<p>Status: <span id="status">Disconnected</span></p>
</div>

<div class="card">
<h3>Posture Data</h3>
Angle: <span id="angle">0</span>°<br>
Deviation: <span id="deviation">0</span>°<br>
Status: <span id="posture">Waiting...</span>
</div>

<div class="card">
<h3>Threshold</h3>

<input type="range" min="5" max="30" value="15"
class="slider" id="thresholdSlider">

<p>Threshold: <span id="thresholdValue">15</span>°</p>

</div>

<div class="card">
<h3>Session Timer</h3>
<span id="timer">0</span> sec
</div>

<div class="card">
<h3>Posture Statistics</h3>
Good Time: <span id="goodTime">0</span> sec<br>
Bad Time: <span id="badTime">0</span> sec
</div>

<div class="card">
<h3>Daily Posture Score</h3>
Score: <span id="score">0</span>/100
</div>

<div class="card">
<h3>Alert Counter</h3>
Bad Posture Alerts: <span id="alerts">0</span>
</div>

<div class="card">
<h3>Posture Graph</h3>
<canvas id="graph"></canvas>
</div>

<script>

let characteristic
let threshold = 15

let goodTime = 0
let badTime = 0
let alerts = 0
let startTime

const slider=document.getElementById("thresholdSlider")

slider.oninput=function(){

threshold=this.value
document.getElementById("thresholdValue").innerText=threshold
sendThreshold()

}

async function connectDevice(){

const device = await navigator.bluetooth.requestDevice({
filters:[{name:'POSTURA_V3'}],
optionalServices:['12345678-1234-1234-1234-1234567890ab']
})

document.getElementById("status").innerText="Connecting..."

const server = await device.gatt.connect()

const service = await server.getPrimaryService(
'12345678-1234-1234-1234-1234567890ab')

characteristic = await service.getCharacteristic(
'abcd1234-5678-1234-5678-abcdef123456')

await characteristic.startNotifications()

characteristic.addEventListener(
'characteristicvaluechanged',
handleData)

document.getElementById("status").innerText="Connected"

startTimer()

}

function handleData(event){

let value=new TextDecoder().decode(event.target.value)

let data=value.split(",")

let angle=parseFloat(data[0])
let deviation=parseFloat(data[1])

document.getElementById("angle").innerText=angle.toFixed(2)
document.getElementById("deviation").innerText=deviation.toFixed(2)

if(deviation>threshold){

document.getElementById("posture").innerHTML="<span class='bad'>BAD POSTURE</span>"
badTime++
alerts++

}else{

document.getElementById("posture").innerHTML="<span class='good'>GOOD POSTURE</span>"
goodTime++

}

document.getElementById("goodTime").innerText=goodTime
document.getElementById("badTime").innerText=badTime
document.getElementById("alerts").innerText=alerts

calculateScore()
updateGraph(deviation)

}

function calculateScore(){

let total=goodTime+badTime

if(total==0)return

let score=Math.round((goodTime/total)*100)

document.getElementById("score").innerText=score

}

function startTimer(){

startTime=Date.now()

setInterval(function(){

let sec=Math.floor((Date.now()-startTime)/1000)

document.getElementById("timer").innerText=sec

},1000)

}

function sendThreshold(){

if(characteristic){

let encoder=new TextEncoder()

characteristic.writeValue(encoder.encode(threshold))

}

}

const ctx=document.getElementById('graph')

const chart=new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
label:'Deviation',
data:[],
borderColor:'blue',
fill:false
}]
},
options:{animation:false}
})

function updateGraph(value){

let t=chart.data.labels.length

chart.data.labels.push(t)
chart.data.datasets[0].data.push(value)

if(chart.data.labels.length>40){

chart.data.labels.shift()
chart.data.datasets[0].data.shift()

}

chart.update()

}

</script>

</body>
</html>
